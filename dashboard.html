<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Cambioseh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --dorado: #d4af37; }
        body { background: #050b18; color: white; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.1); border-radius: 24px; }
        .family-photo { width: 100%; height: 200px; object-fit: cover; border-radius: 24px; }
    </style>
</head>
<body class="pb-24">

    <nav class="p-6 flex justify-between items-center bg-[#0a192f]">
        <div>
            <p class="text-[10px] text-white/40 uppercase font-bold tracking-widest">Panel Premium</p>
            <h2 id="userGreeting" class="text-lg font-bold">Bienvenido</h2>
        </div>
        <img src="https://i.ibb.co/dwfhBg01/Ey-H-Cambios-Logo-20260127-121621-0000.png" class="h-10">
    </nav>

    <main class="max-w-md mx-auto px-6 mt-6 space-y-6">

        <div class="glass p-4">
            <img src="https://images.unsplash.com/photo-1511895426328-dc8714191300?auto=format&fit=crop&w=500&q=80" class="family-photo mb-4">
            <p class="text-center italic text-sm text-white/80">"Tu familia te espera, nosotros acortamos la distancia." ❤️</p>
        </div>

        <div class="glass p-6">
            <h3 class="text-[#d4af37] font-bold text-xs uppercase mb-4">Calculadora de Envío</h3>
            <div class="space-y-4">
                <div class="bg-white/5 p-4 rounded-xl border border-white/10">
                    <label class="text-[8px] block text-white/40">ENVÍAS (COP)</label>
                    <input type="number" id="cop" value="100000" class="bg-transparent w-full text-xl font-bold outline-none">
                </div>
                <div class="bg-white/5 p-4 rounded-xl border border-white/10">
                    <label class="text-[8px] block text-white/40">RECIBEN (VES)</label>
                    <input type="number" id="ves" readonly class="bg-transparent w-full text-xl font-bold outline-none text-[#d4af37]">
                </div>
                <button onclick="enviarWhatsApp()" class="w-full bg-[#d4af37] text-black font-black py-4 rounded-xl uppercase text-xs tracking-widest">
                    Realizar Operación
                </button>
            </div>
        </div>

        <div class="glass p-6">
            <h3 class="text-white/50 font-bold text-xs uppercase mb-4">Cuentas para Transferir</h3>
            <div class="space-y-3" id="directorio">
                <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-university text-gold"></i>
                        <div>
                            <p class="text-sm font-bold">Banesco - Pedro Pérez</p>
                            <p class="text-[10px] text-white/40">0134-XXXX-XXXX-XXXX</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // Lógica de nombre
        const nombre = localStorage.getItem('usuarioNombre') || 'Usuario';
        document.getElementById('userGreeting').innerText = 'Hola, ' + nombre;

        // Lógica tasa
        const TASA = 3.82;
        const c = document.getElementById('cop'), v = document.getElementById('ves');
        function calc() { v.value = (c.value * TASA).toFixed(0); }
        c.addEventListener('input', calc);
        calc();

        // Enviar a WhatsApp
        function enviarWhatsApp() {
            const msg = `Hola Cambioseh, soy ${nombre}. Quiero enviar ${c.value} COP.`;
            window.location.href = `https://wa.me/573203043142?text=${encodeURIComponent(msg)}`;
        }
    </script>
</body>
</html>
