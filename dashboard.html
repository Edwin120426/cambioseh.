<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel CambiosEH</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white min-h-screen pb-10">

    <nav class="p-5 border-b border-slate-800 flex justify-between items-center bg-slate-900 sticky top-0 z-50">
        <h1 class="text-xl font-black text-blue-400 italic">CAMBIOSEH</h1>
        <button onclick="logout()" class="text-xs bg-red-500/10 text-red-400 px-3 py-1 rounded-lg border border-red-500/20">SALIR</button>
    </nav>

    <div class="p-5 max-w-md mx-auto">
        <div class="mb-8">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                <i class="fa-solid fa-address-book text-blue-500"></i> Mis Cuentas Guardadas
            </h2>
            <div id="lista-cuentas" class="space-y-3">
                <p class="text-slate-500 text-sm italic">Cargando directorio...</p>
            </div>
        </div>

        <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-2xl">
            <h3 class="text-blue-400 font-bold mb-4 text-center">Añadir Nueva Cuenta</h3>
            <div class="space-y-4">
                <select id="banco" class="w-full p-4 bg-slate-700 rounded-xl outline-none border border-slate-600 focus:border-blue-500 text-sm">
                    <option value="">Seleccione el Banco o Pago Móvil</option>
                    <option value="PAGO MÓVIL">📱 PAGO MÓVIL (Cualquier Banco)</option>
                    <option disabled>──────────</option>
                    <option value="0102 - BANCO DE VENEZUELA">0102 - BANCO DE VENEZUELA</option>
                    <option value="0104 - BANCO VENEZOLANO DE CREDITO">0104 - BANCO VENEZOLANO DE CREDITO</option>
                    <option value="0105 - BANCO MERCANTIL">0105 - BANCO MERCANTIL</option>
                    <option value="0108 - BBVA PROVINCIAL">0108 - BBVA PROVINCIAL</option>
                    <option value="0114 - BANCARIBE">0114 - BANCARIBE</option>
                    <option value="0115 - BANCO EXTERIOR">0115 - BANCO EXTERIOR</option>
                    <option value="0128 - BANCO CARONI">0128 - BANCO CARONI</option>
                    <option value="0134 - BANESCO">0134 - BANESCO</option>
                    <option value="0137 - BANCO SOFITASA">0137 - BANCO SOFITASA</option>
                    <option value="0138 - BANCO PLAZA">0138 - BANCO PLAZA</option>
                    <option value="0146 - BANGENTE">0146 - BANGENTE</option>
                    <option value="0151 - BANCO FONDO COMUN">0151 - BANCO FONDO COMUN</option>
                    <option value="0156 - 100% BANCO">0156 - 100% BANCO</option>
                    <option value="0157 - DELSUR BANCO">0157 - DELSUR BANCO UNIVERSAL</option>
                    <option value="0163 - BANCO DEL TESORO">0163 - BANCO DEL TESORO</option>
                    <option value="0168 - BANCRECER">0168 - BANCRECER</option>
                    <option value="0169 - R4 BANCO MICROFINANCIERO">0169 - R4 BANCO MICROFINANCIERO</option>
                    <option value="0171 - BANCO ACTIVO">0171 - BANCO ACTIVO</option>
                    <option value="0172 - BANCAMIGA">0172 - BANCAMIGA BANCO UNIVERSAL</option>
                    <option value="0174 - BANPLUS">0174 - BANPLUS</option>
                    <option value="0175 - BCO DIGITAL TRABAJADORES">0175 - BCO DIGITAL TRABAJADORES</option>
                    <option value="0177 - BANFANB">0177 - BANFANB</option>
                    <option value="0178 - N58 BANCO DIGITAL">0178 - N58 BANCO DIGITAL</option>
                    <option value="0191 - BNC">0191 - BANCO NACIONAL DE CRÉDITO</option>
                </select>
                <input type="text" id="titular" placeholder="Nombre del Titular" class="w-full p-4 bg-slate-700 rounded-xl border border-slate-600 outline-none focus:border-blue-500">
                <input type="number" id="cedula" placeholder="Cédula / RIF" class="w-full p-4 bg-slate-700 rounded-xl border border-slate-600 outline-none focus:border-blue-500">
                <input type="text" id="num_cuenta" placeholder="Número de Cuenta (20 dígitos)" class="w-full p-4 bg-slate-700 rounded-xl border border-slate-600 outline-none focus:border-blue-500">
                <button onclick="guardarCuenta()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-900/40">
                    GUARDAR EN MI DIRECTORIO
                </button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://kcwvyaczwpoxrzg.supabase.co";
        const SUPABASE_KEY = "Sb_publishable_u_S57SOOIf99DGrRJkratg_5W61-SMJ";
        const miNumero = "573203043142";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.onload = cargarCuentas;

        async function cargarCuentas() {
            const { data: { user } } = await _supabase.auth.getUser();
            if(!user) return;

            const { data: cuentas } = await _supabase
                .from('cuentas guardadas')
                .select('*')
                .eq('ID de usuario', user.id);

            const contenedor = document.getElementById('lista-cuentas');
            contenedor.innerHTML = cuentas.length ? "" : "<p class='text-slate-600 text-sm'>No tienes cuentas guardadas.</p>";

            cuentas.forEach(c => {
                contenedor.innerHTML += `
                    <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 flex justify-between items-center">
                        <div class="overflow-hidden">
                            <p class="font-bold text-white text-sm truncate">${c.titular_de_la_cuenta}</p>
                            <p class="text-[10px] text-slate-400 uppercase">${c.nombre_del_banco} | ${c.numero_de_cuenta}</p>
                        </div>
                        <a href="https://wa.me/${miNumero}?text=Hola CambiosEH, quiero enviar a esta cuenta: %0A*Titular:* ${c.titular_de_la_cuenta}%0A*Banco:* ${c.nombre_del_banco}%0A*Cuenta:* ${c.numero_de_cuenta}" 
                           class="bg-green-600 p-3 rounded-xl text-white ml-2 flex-shrink-0">
                           <i class="fa-brands fa-whatsapp text-lg"></i>
                        </a>
                    </div>`;
            });
        }

        async function guardarCuenta() {
            const { data: { user } } = await _supabase.auth.getUser();
            const { error } = await _supabase.from('cuentas guardadas').insert([{ 
                "ID de usuario": user.id,
                titular_de_la_cuenta: document.getElementById('titular').value,
                nombre_del_banco: document.getElementById('banco').value,
                numero_de_cuenta: document.getElementById('num_cuenta').value
            }]);

            if (error) alert("Error al guardar: " + error.message);
            else { alert("¡Cuenta guardada!"); cargarCuentas(); }
        }

        async function logout() { await _supabase.auth.signOut(); window.location.href = "index.html"; }
    </script>
</body>
</html>
