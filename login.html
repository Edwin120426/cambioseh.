<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Cambioseh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #050b18; color: white; font-family: sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.15); border-radius: 35px; }
        .input-premium { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 18px; padding: 1rem; width: 100%; color: white; outline: none; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-height-screen pt-20">
    <img src="https://i.ibb.co/dwfhBg01/Ey-H-Cambios-Logo-20260127-121621-0000.png" class="h-20 mb-10">
    <main class="max-w-md w-full px-6">
        <div class="glass-card p-8">
            <h2 class="text-center font-bold mb-6 text-xl uppercase tracking-widest">Ingresar</h2>
            <form id="loginForm" class="space-y-6">
                <input type="text" placeholder="Usuario" class="input-premium">
                <input type="password" placeholder="Contraseña" class="input-premium">
                <button type="submit" class="w-full bg-[#d4af37] text-black py-4 rounded-xl font-bold uppercase">Entrar</button>
            </form>
        </div>
    </main>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
