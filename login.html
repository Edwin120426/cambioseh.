<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Cambioseh Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --dorado: #d4af37;
            --azul-deep: #050b18;
        }
        body { 
            background: radial-gradient(circle at top, #0a192f 0%, #050b18 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        .text-gold { color: var(--dorado); }
        .bg-gold { background-color: var(--dorado); }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 40px;
        }

        .input-premium {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 1.2rem;
            width: 100%;
            outline: none;
            transition: all 0.3s ease;
            color: white;
            font-size: 16px;
        }
        .input-premium:focus {
            border-color: var(--dorado);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        .label-gold {
            text-transform: uppercase;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 3px;
            color: var(--dorado);
            margin-left: 15px;
            margin-bottom: 10px;
            display: block;
            opacity: 0.7;
        }
    </style>
</head>
<body class="pb-10">

    <header class="pt-12 pb-6 text-center">
        <a href="index.html">
            <img src="https://i.ibb.co/dwfhBg01/Ey-H-Cambios-Logo-20260127-121621-0000.png" 
                 alt="Cambioseh" 
                 class="h-20 w-auto mx-auto object-contain drop-shadow-[0_0_10px_rgba(212,175,55,0.1)]">
        </a>
    </header>

    <main class="max-w-md mx-auto px-8 w-full">
        
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold tracking-tight">Acceso <span class="text-gold italic">Seguro</span></h1>
            <p class="text-[9px] uppercase tracking-[5px] text-white/30 font-bold mt-3">Gestiona tus remesas con confianza</p>
        </div>

        <div class="glass-card p-10 shadow-2xl">
            <form id="loginForm" class="space-y-6">
                
                <div>
                    <label class="label-gold">Usuario o Correo</label>
                    <div class="relative">
                        <i class="fa-solid fa-user absolute left-5 top-1/2 -translate-y-1/2 text-white/20 text-sm"></i>
                        <input type="text" placeholder="Tu usuario" class="input-premium pl-14">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center pr-2">
                        <label class="label-gold">Contraseña</label>
                        <a href="#" class="text-[9px] text-white/30 hover:text-gold uppercase font-bold tracking-tighter">¿Olvidaste la clave?</a>
                    </div>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-white/20 text-sm"></i>
                        <input type="password" id="pass" placeholder="••••••••" class="input-premium pl-14">
                        <button type="button" onclick="togglePass()" class="absolute right-5 top-1/2 -translate-y-1/2 text-white/30 hover:text-gold transition-colors">
                            <i id="eyeIcon" class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="w-full bg-gold text-[#050b18] py-5 rounded-2xl mt-4 font-black text-lg shadow-[0_20px_40px_rgba(212,175,55,0.2)] transition-all active:scale-95 uppercase tracking-widest">
                    Iniciar Sesión
                </button>
            </form>
        </div>

        <div class="text-center mt-10">
            <p class="text-xs text-white/40 mb-2">¿Aún no eres miembro?</p>
            <a href="registro.html" class="text-gold font-bold uppercase tracking-widest text-xs border border-gold/30 px-6 py-3 rounded-xl inline-block hover:bg-gold/5 transition-all">
                Crear cuenta nueva
            </a>
        </div>

        <p class="text-center mt-16 text-[8px] text-white/10 uppercase tracking-[6px] font-bold">Cambioseh Luxury Financial © 2026</p>
    </main>

    <script>
        // Función para ver/ocultar contraseña
        function togglePass() {
            const passInput = document.getElementById('pass');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passInput.type = 'password';
                eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // Simulación de acceso
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Acceso verificado. Bienvenid@ a Cambioseh.');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
