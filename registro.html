<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Cambioseh Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --dorado: #d4af37; --azul-deep: #050b18; }
        body { background: radial-gradient(circle at top, #0a192f 0%, #050b18 100%); font-family: 'Plus Jakarta Sans', sans-serif; color: white; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.15); border-radius: 35px; }
        .input-premium { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 18px; padding: 1rem 1.2rem; width: 100%; outline: none; color: white; }
        .input-premium:focus { border-color: var(--dorado); background: rgba(255, 255, 255, 0.1); }
        .label-gold { text-transform: uppercase; font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--dorado); margin-bottom: 8px; display: block; }
    </style>
</head>
<body class="pb-10">
    <header class="pt-8 pb-4 text-center">
        <img src="https://i.ibb.co/dwfhBg01/Ey-H-Cambios-Logo-20260127-121621-0000.png" class="h-16 mx-auto">
    </header>

    <main class="max-w-md mx-auto px-6">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-extrabold">Crea tu Cuenta <span class="text-gold italic">Premium</span></h1>
        </div>

        <div class="glass-card p-8 shadow-2xl">
            <form id="registroForm" class="space-y-5">
                <div>
                    <label class="label-gold">Nombre Completo</label>
                    <input type="text" id="nombreInput" placeholder="Ej. Juan Pérez" class="input-premium" required>
                </div>
                <div>
                    <label class="label-gold">Correo Electrónico</label>
                    <input type="email" class="input-premium" required>
                </div>
                <div>
                    <label class="label-gold">Contraseña</label>
                    <input type="password" class="input-premium" required>
                </div>
                <button type="submit" class="w-full bg-gold text-[#050b18] py-5 rounded-2xl font-black uppercase tracking-widest">
                    Finalizar Registro
                </button>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('registroForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const nombre = document.getElementById('nombreInput').value;
            // Guardamos el nombre para usarlo en el Dashboard
            localStorage.setItem('usuarioNombre', nombre);
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
