<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Panel | Cambioseh Luxury</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: #050b18; 
            font-family: sans-serif; 
            color: white; 
        }
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(212, 175, 55, 0.1); 
            border-radius: 24px; 
        }
        .text-gold { color: #d4af37; }
        .bg-gold { background-color: #d4af37; }
        .family-photo {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 24px;
            border: 2px solid rgba(212, 175, 55, 0.2);
        }
    </style>
</head>
<body class="pb-24">

    <nav class="p-6 flex justify-between items-center bg-[#0a192f] border-b border-white/5">
        <div>
            <p class="text-[10px] text-white/40 uppercase font-bold tracking-widest">Bienvenido,</p>
            <h2 class="text-lg font-bold">Edwin Suárez</h2>
        </div>
        <img src="https://i.ibb.co/dwfhBg01/Ey-H-Cambios-Logo-20260127-121621-0000.png" class="h-10">
    </nav>

    <main class="max-w-md mx-auto px-6 mt-6 space-y-6">

        <div class="glass p-4">
            <img src="https://images.unsplash.com/photo-1511895426328-dc8714191300?auto=format&fit=crop&w=500&q=80" alt="Familia" class="family-photo mb-4">
            <p class="text-center italic text-sm text-white/80">"El amor no conoce fronteras. Cada envío es un abrazo que llega a casa." ❤️</p>
        </div>

        <div class="glass p-6">
            <h3 class="text-gold font-bold text-xs uppercase tracking-widest mb-4"><i class="fa-solid fa-calculator mr-2"></i> Calculadora Rápida</h3>
            <div class="space-y-4">
                <div class="bg-white/5 p-4 rounded-xl border border-white/10">
                    <input type="number" id="cop" placeholder="Monto COP" class="bg-transparent w-full text-xl font-bold outline-none text-white">
                </div>
                <div class="bg-white/5 p-4 rounded-xl border border-white/10">
                    <input type="number" id="ves" readonly class="bg-transparent w-full text-xl font-bold outline-none text-gold">
                </div>
                <button onclick="conectarWhatsApp()" class="w-full bg-gold text-black font-black py-4 rounded-xl uppercase text-xs tracking-widest shadow-lg shadow-yellow-900/20">
                    Enviar a mi familia ahora
                </button>
            </div>
        </div>

        <div class="glass p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-white/50 font-bold text-xs uppercase tracking-widest">Mis Cuentas Guardadas</h3>
                <button class="text-gold text-xs font-bold">+ Agregar</button>
            </div>
            
            <div class="space-y-3">
                <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/5">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-900/50 rounded-full flex items-center justify-center text-blue-400">
                            <i class="fa-solid fa-university"></i>
                        </div>
                        <div>
                            <p class="text-sm font-bold">Mamá (Banesco)</p>
                            <p class="text-[10px] text-white/40 italic">V-12.345.678</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-star text-gold text-xs"></i>
                </div>

                <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/5">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-green-900/50 rounded-full flex items-center justify-center text-green-400">
                            <i class="fa-solid fa-university"></i>
                        </div>
                        <div>
                            <p class="text-sm font-bold">Hermano (Mercantil)</p>
                            <p class="text-[10px] text-white/40 italic">V-20.987.654</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-[#0a192f] border-t border-white/10 px-8 py-4 flex justify-between items-center">
        <div class="text-gold flex flex-col items-center"><i class="fa-solid fa-house"></i><span class="text-[8px] mt-1">Inicio</span></div>
        <div class="text-white/30 flex flex-col items-center"><i class="fa-solid fa-list"></i><span class="text-[8px] mt-1">Órdenes</span></div>
        <div class="text-white/30 flex flex-col items-center"><i class="fa-solid fa-address-book"></i><span class="text-[8px] mt-1">Cuentas</span></div>
        <div class="text-white/30 flex flex-col items-center"><i class="fa-solid fa-gear"></i><span class="text-[8px] mt-1">Ajustes</span></div>
    </div>

    <script>
        const TASA = 3.82;
        const c = document.getElementById('cop'), v = document.getElementById('ves');
        c.addEventListener('input', () => v.value = (c.value * TASA).toFixed(0));

        function conectarWhatsApp() {
            const monto = c.value || 0;
            const mensaje = `Hola Cambioseh, deseo realizar un envío de ${monto} COP para recibir ${v.value} VES.`;
            window.location.href = `https://wa.me/573203043142?text=${encodeURIComponent(mensaje)}`;
        }
    </script>
</body>
</html>
