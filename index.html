<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambioseh | Transferencias Internacionales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0a192f; /* Azul profundo del diseño original */
            color: white;
            margin: 0;
        }
        .text-emerald { color: #10b981; } /* Verde para Sin Comisiones */
        .glass-card {
            background: white;
            border-radius: 30px;
            color: #1e293b;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .badge {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <nav class="p-6 flex justify-between items-center max-w-md mx-auto">
        <div class="text-xl font-extrabold tracking-tighter italic">CAMBIO<span class="text-emerald">SEH</span></div>
        <div class="flex gap-4 items-center">
            <a href="login.html" class="text-sm font-bold opacity-80">Iniciar Sesión</a>
            <a href="registro.html" class="bg-white text-slate-900 px-5 py-2 rounded-xl text-xs font-black uppercase tracking-tight">Crear Cuenta</a>
        </div>
    </nav>

    <header class="max-w-md mx-auto px-6 py-12 text-center">
        <div class="inline-block badge mb-6">
            <span class="w-2 h-2 bg-emerald-500 rounded-full inline-block mr-2"></span> Plataforma Verificada 2026
        </div>
        
        <h1 class="text-4xl md:text-5xl font-extrabold leading-[1.1] mb-6">
            Transferencias Internacionales <br>
            <span class="text-emerald italic">Sin Comisiones</span>
        </h1>

        <p class="text-slate-400 text-sm leading-relaxed mb-12">
            La solución financiera más robusta para el envío de remesas entre Colombia y Venezuela.
        </p>

        <div class="glass-card text-left">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6 border-b border-slate-100 pb-2">Tasas de Cambio Oficiales</p>
            
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <img src="https://flagcdn.com/w40/co.png" class="w-6 h-4 rounded-sm">
                    <span class="font-bold text-slate-700">COP a VES</span>
                </div>
                <div class="text-3xl font-black text-slate-900">3.82</div>
            </div>

            <div class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-3">
                    <img src="https://flagcdn.com/w40/us.png" class="w-6 h-4 rounded-sm">
                    <span class="font-bold text-slate-700">Dólar BCV</span>
                </div>
                <div class="text-xl font-bold text-slate-400">45.48</div>
            </div>

            <div class="space-y-4">
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <label class="text-[9px] font-black text-slate-400 uppercase mb-1 block">Tú envías Pesos</label>
                    <input type="number" id="cop" value="100000" class="bg-transparent w-full text-2xl font-black outline-none text-slate-800">
                </div>

                <div class="bg-emerald-50 p-4 rounded-2xl border border-emerald-100">
                    <label class="text-[9px] font-black text-emerald-600 uppercase mb-1 block">Ellos reciben Bolívares</label>
                    <input type="number" id="bs" readonly class="bg-transparent w-full text-2xl font-black outline-none text-emerald-700">
                </div>
            </div>

            <button onclick="window.location.href='registro.html'" class="w-full bg-slate-900 text-white py-5 rounded-2xl mt-8 font-black text-lg uppercase tracking-widest shadow-2xl transition-transform active:scale-95">
                Comenzar Envío
            </button>
        </div>
    </header>

    <a href="https://wa.me/573203043142" class="fixed bottom-6 right-6 bg-[#25D366] text-white w-14 h-14 rounded-full flex items-center justify-center text-3xl shadow-2xl">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script>
        const T_COP = 3.82;
        const c = document.getElementById('cop'), b = document.getElementById('bs');
        
        function update(val) {
            let n = parseFloat(val) || 0;
            b.value = (n * T_COP).toFixed(0);
        }
        c.addEventListener('input', (e) => update(e.target.value));
        update(100000);
    </script>
</body>
</html>
