<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambioseh | Remesas Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f1f5f9; font-family: 'Segoe UI', sans-serif; }
        .bg-navy { background-color: #0f172a; }
        .text-naranja { color: #f97316; }
        .card-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-white py-6 border-b-4 border-orange-500 shadow-sm">
        <div class="max-w-md mx-auto px-4 flex justify-center">
            <img src="https://i.ibb.co/dwfhBg01/Ey-H-Cambios-Logo-20260127-121621-0000.png" 
                 alt="Cambioseh Logo" 
                 class="h-20 w-auto object-contain">
        </div>
    </header>

    <div class="max-w-md mx-auto px-4 mt-6 flex gap-3">
        <a href="login.html" class="flex-1 bg-white text-slate-700 py-3.5 rounded-2xl font-bold text-center border border-slate-200 shadow-sm">Iniciar Sesión</a>
        <a href="registro.html" class="flex-1 bg-navy text-white py-3.5 rounded-2xl font-bold text-center shadow-lg">Registrarme</a>
    </div>

    <main class="max-w-md mx-auto px-4 mt-6">
        <div class="bg-white rounded-[2.5rem] p-8 card-shadow border border-slate-100">
            
            <div class="text-center mb-8">
                <h2 class="text-slate-400 text-[10px] font-black uppercase tracking-[3px]">Cotizador en Tiempo Real</h2>
                <div class="h-1 w-10 bg-orange-500 mx-auto mt-2 rounded-full"></div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-10">
                <div class="bg-slate-50 p-4 rounded-3xl text-center border border-slate-100">
                    <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Tasa COP</p>
                    <p class="text-xl font-black text-slate-800 italic">3.82</p>
                </div>
                <div class="bg-slate-50 p-4 rounded-3xl text-center border border-slate-100">
                    <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Dólar BCV</p>
                    <p class="text-xl font-black text-slate-800 italic">45.48</p>
                </div>
            </div>

            <div class="space-y-5">
                <div class="relative">
                    <label class="text-[10px] font-bold text-slate-400 ml-4 mb-2 block uppercase">Envías desde Colombia</label>
                    <div class="flex items-center bg-slate-50 p-5 rounded-3xl border-2 border-slate-100 focus-within:border-orange-400 transition-all">
                        <img src="https://flagcdn.com/w80/co.png" class="w-8 h-5 rounded shadow-sm mr-4">
                        <input type="number" id="cop" value="100000" class="bg-transparent text-3xl font-black w-full outline-none text-slate-800">
                        <span class="text-xs font-bold text-slate-400">COP</span>
                    </div>
                </div>

                <div class="flex justify-center -my-3 relative z-10">
                    <div class="bg-orange-500 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg border-4 border-white">
                        <i class="fa-solid fa-arrow-down-long"></i>
                    </div>
                </div>

                <div class="relative">
                    <label class="text-[10px] font-bold text-orange-500 ml-4 mb-2 block uppercase font-black">Reciben en Venezuela</label>
                    <div class="flex items-center bg-orange-50 p-5 rounded-3xl border-2 border-orange-100 focus-within:border-orange-500 transition-all">
                        <img src="https://flagcdn.com/w80/ve.png" class="w-8 h-5 rounded shadow-sm mr-4">
                        <input type="number" id="bs" class="bg-transparent text-3xl font-black w-full outline-none text-orange-700">
                        <span class="text-xs font-bold text-orange-300">VES</span>
                    </div>
                </div>
            </div>

            <div class="mt-8 pt-6 border-t border-slate-50 text-center">
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Equivalente Dólar BCV</p>
                <p class="text-3xl font-black text-navy italic">$<span id="usd">0.00</span></p>
            </div>

            <button onclick="window.location.href='registro.html'" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-black py-6 rounded-3xl mt-8 text-xl shadow-xl shadow-orange-200 transition-all active:scale-95 uppercase tracking-widest">
                Enviar Dinero
            </button>
        </div>

        <div class="mt-8 text-center">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[3px]">Seguridad Certificada</p>
            <div class="flex justify-center gap-4 mt-3 opacity-30">
                <i class="fa-brands fa-cc-visa text-2xl text-slate-800"></i>
                <i class="fa-brands fa-cc-mastercard text-2xl text-slate-800"></i>
                <i class="fa-solid fa-shield-halved text-2xl text-slate-800"></i>
            </div>
        </div>
    </main>

    <a href="https://wa.me/573203043142" class="fixed bottom-6 right-6 bg-[#25D366] text-white w-16 h-16 rounded-full flex items-center justify-center text-4xl shadow-2xl z-50 animate-bounce">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script>
        const T_COP = 3.82, T_BCV = 45.48;
        const c = document.getElementById('cop'), b = document.getElementById('bs'), u = document.getElementById('usd');
        
        function update(val, type) {
            let n = parseFloat(val) || 0;
            if(type === 'c') {
                let resBs = n * T_COP;
                b.value = resBs.toFixed(0);
                u.innerText = (resBs / T_BCV).toFixed(2);
            } else {
                c.value = (n / T_COP).toFixed(0);
                u.innerText = (n / T_BCV).toFixed(2);
            }
        }
        c.addEventListener('input', (e) => update(e.target.value, 'c'));
        b.addEventListener('input', (e) => update(e.target.value, 'b'));
        update(100000, 'c');
    </script>
</body>
</html>
