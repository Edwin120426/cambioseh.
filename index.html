<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambioseh | Premium Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dorado: #d4af37;
            --azul-deep: #050b18;
        }
        body { 
            background: radial-gradient(circle at top, #0a192f 0%, #050b18 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white;
            min-height: 100vh;
        }
        .text-gold { color: var(--dorado); }
        .bg-gold { background-color: var(--dorado); }
        .border-gold { border-color: var(--dorado); }
        
        /* Efecto Transparencia Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 32px;
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-glass:focus-within {
            border-color: var(--dorado);
            background: rgba(255, 255, 255, 0.08);
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="pb-12">

    <header class="py-8 text-center">
        <div class="max-w-md mx-auto px-6">
            <div class="bg-white/90 p-4 rounded-2xl shadow-[0_0_20px_rgba(212,175,55,0.3)] inline-block">
                <img src="https://i.ibb.co/dwfhBg01/Ey-H-Cambios-Logo-20260127-121621-0000.png" 
                     alt="Cambioseh Logo" 
                     class="h-16 w-auto object-contain">
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-6">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold mb-2 tracking-tight">Envío de <span class="text-gold">Remesas</span></h1>
            <p class="text-xs uppercase tracking-[4px] text-white/50">Exclusividad & Seguridad</p>
        </div>

        <div class="glass-card p-8 shadow-2xl">
            
            <div class="flex justify-between mb-10">
                <div class="text-center">
                    <p class="text-[9px] font-bold text-white/40 uppercase tracking-widest mb-1">Tasa COP</p>
                    <p class="text-2xl font-bold text-gold">3.82</p>
                </div>
                <div class="w-[1px] bg-white/10"></div>
                <div class="text-center">
                    <p class="text-[9px] font-bold text-white/40 uppercase tracking-widest mb-1">Dólar BCV</p>
                    <p class="text-2xl font-bold text-gold">45.48</p>
                </div>
            </div>

            <div class="space-y-6">
                <div class="input-glass p-5 rounded-2xl">
                    <label class="text-[10px] font-bold text-white/40 uppercase mb-2 block">Monto a Enviar (COP)</label>
                    <div class="flex items-center">
                        <img src="https://flagcdn.com/w80/co.png" class="w-7 h-auto rounded-sm mr-4 opacity-80">
                        <input type="number" id="cop" value="100000" class="bg-transparent text-2xl font-bold w-full outline-none text-white">
                        <span class="text-gold font-bold text-xs">COP</span>
                    </div>
                </div>

                <div class="input-glass p-5 rounded-2xl border-l-4 border-l-[#d4af37]">
                    <label class="text-[10px] font-bold text-gold uppercase mb-2 block">Monto a Recibir (VES)</label>
                    <div class="flex items-center">
                        <img src="https://flagcdn.com/w80/ve.png" class="w-7 h-auto rounded-sm mr-4 opacity-80">
                        <input type="number" id="bs" class="bg-transparent text-2xl font-bold w-full outline-none text-white">
                        <span class="text-gold font-bold text-xs">VES</span>
                    </div>
                </div>

                <div class="bg-white/5 p-4 rounded-2xl text-center border border-white/5">
                    <p class="text-[9px] text-white/30 uppercase mb-1 tracking-tighter">Referencia Dólar BCV</p>
                    <p class="text-2xl font-bold text-white/90 italic">$ <span id="usd">0.00</span></p>
                </div>
            </div>

            <button onclick="window.location.href='registro.html'" class="w-full bg-gold text-navy-bg py-5 rounded-2xl mt-8 font-black text-lg shadow-[0_10px_30px_rgba(212,175,55,0.3)] transition-all active:scale-95 uppercase tracking-widest text-black">
                Iniciar Operación
            </button>
        </div>

        <div class="mt-8 flex gap-4">
            <a href="login.html" class="flex-1 py-4 glass-card text-center text-xs font-bold uppercase tracking-widest border-white/10">Entrar</a>
            <a href="registro.html" class="flex-1 py-4 glass-card text-center text-xs font-bold uppercase tracking-widest border-white/10">Registro</a>
        </div>

        <p class="text-center mt-12 text-[9px] text-white/20 uppercase tracking-[5px]">Cambioseh Luxury Banking © 2026</p>
    </main>

    <a href="https://wa.me/573203043142" class="fixed bottom-6 right-6 bg-[#d4af37] text-black w-14 h-14 rounded-full flex items-center justify-center text-2xl shadow-[0_10px_30px_rgba(212,175,55,0.4)] z-50">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script>
        const T_COP = 3.82, T_BCV = 45.48;
        const c = document.getElementById('cop'), b = document.getElementById('bs'), u = document.getElementById('usd');
        
        function update(val, type) {
            let n = parseFloat(val) || 0;
            if(type === 'c') {
                let resBs = n * T_COP;
                b.value = resBs.toFixed(0);
                u.innerText = (resBs / T_BCV).toFixed(2);
            } else {
                c.value = (n / T_COP).toFixed(0);
                u.innerText = (n / T_BCV).toFixed(2);
            }
        }
        c.addEventListener('input', (e) => update(e.target.value, 'c'));
        b.addEventListener('input', (e) => update(e.target.value, 'b'));
        update(100000, 'c');
    </script>
</body>
</html>
