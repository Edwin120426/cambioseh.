<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambioseh | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --dorado: #d4af37;
            --azul-deep: #050b18;
        }
        body { 
            background: radial-gradient(circle at top, #0a192f 0%, #050b18 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white;
            min-height: 100vh;
            margin: 0;
        }
        .text-gold { color: var(--dorado); }
        .bg-gold { background-color: var(--dorado); }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 35px;
        }

        .input-premium {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        .input-premium:focus-within {
            border-color: var(--dorado);
            background: rgba(255, 255, 255, 0.1);
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="pb-10">

    <header class="pt-10 pb-6 text-center">
        <div class="max-w-md mx-auto px-6">
            <img src="https://i.ibb.co/dwfhBg01/Ey-H-Cambios-Logo-20260127-121621-0000.png" 
                 alt="Cambioseh" 
                 class="h-24 w-auto mx-auto object-contain drop-shadow-[0_0_15px_rgba(212,175,55,0.2)]">
        </div>
    </header>

    <main class="max-w-md mx-auto px-6">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight mb-1">Envío de <span class="text-gold italic">Remesas</span></h1>
            <p class="text-[10px] uppercase tracking-[5px] text-white/40 font-bold">Exclusividad & Seguridad</p>
        </div>

        <div class="glass-card p-8 shadow-2xl">
            
            <div class="grid grid-cols-2 gap-4 mb-10 text-center">
                <div>
                    <p class="text-[9px] font-bold text-white/30 uppercase tracking-widest mb-1">Tasa COP</p>
                    <p class="text-2xl font-black text-gold italic">3.82</p>
                </div>
                <div class="border-l border-white/10">
                    <p class="text-[9px] font-bold text-white/30 uppercase tracking-widest mb-1">Dólar BCV</p>
                    <p class="text-2xl font-black text-gold italic">45.48</p>
                </div>
            </div>

            <div class="space-y-5">
                <div class="input-premium p-5">
                    <label class="text-[9px] font-bold text-white/30 uppercase mb-2 block">Monto a Enviar (COP)</label>
                    <div class="flex items-center">
                        <img src="https://flagcdn.com/w80/co.png" class="w-6 h-auto rounded-sm mr-4 opacity-70">
                        <input type="number" id="cop" value="100000" class="bg-transparent text-2xl font-bold w-full outline-none text-white">
                        <span class="text-gold font-bold text-xs">COP</span>
                    </div>
                </div>

                <div class="input-premium p-5 border-l-4 border-l-[#d4af37]">
                    <label class="text-[9px] font-bold text-gold/80 uppercase mb-2 block font-black">Reciben en Venezuela (VES)</label>
                    <div class="flex items-center">
                        <img src="https://flagcdn.com/w80/ve.png" class="w-6 h-auto rounded-sm mr-4 opacity-70">
                        <input type="number" id="bs" class="bg-transparent text-2xl font-bold w-full outline-none text-white">
                        <span class="text-gold font-bold text-xs">VES</span>
                    </div>
                </div>

                <div class="bg-white/5 py-4 rounded-2xl text-center">
                    <p class="text-[9px] text-white/20 uppercase mb-1 tracking-widest">Referencia Dólar BCV</p>
                    <p class="text-3xl font-black text-white/90 italic">$ <span id="usd">0.00</span></p>
                </div>
            </div>

            <button onclick="window.location.href='registro.html'" class="w-full bg-gold text-[#050b18] py-5 rounded-2xl mt-8 font-black text-lg shadow-[0_15px_35px_rgba(212,175,55,0.25)] transition-all active:scale-95 uppercase tracking-widest">
                Iniciar Operación
            </button>
        </div>

        <div class="mt-8 flex gap-3">
            <a href="login.html" class="flex-1 py-4 glass-card text-center text-[10px] font-bold uppercase tracking-widest text-white/60">Entrar</a>
            <a href="registro.html" class="flex-1 py-4 glass-card text-center text-[10px] font-bold uppercase tracking-widest text-white/60">Registro</a>
        </div>

        <p class="text-center mt-12 text-[8px] text-white/10 uppercase tracking-[6px] font-bold">Cambioseh Luxury Financial © 2026</p>
    </main>

    <a href="https://wa.me/573203043142" class="fixed bottom-6 right-6 bg-gold text-black w-14 h-14 rounded-full flex items-center justify-center text-2xl shadow-2xl z-50">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script>
        const T_COP = 3.82, T_BCV = 45.48;
        const c = document.getElementById('cop'), b = document.getElementById('bs'), u = document.getElementById('usd');
        function update(v, t) {
            let n = parseFloat(v) || 0;
            if(t === 'c') {
                let r = n * T_COP;
                b.value = r.toFixed(0);
                u.innerText = (r / T_BCV).toFixed(2);
            } else {
                c.value = (n / T_COP).toFixed(0);
                u.innerText = (n / T_BCV).toFixed(2);
            }
        }
        c.addEventListener('input', (e) => update(e.target.value, 'c'));
        b.addEventListener('input', (e) => update(e.target.value, 'b'));
        update(100000, 'c');
    </script>
</body>
</html>
