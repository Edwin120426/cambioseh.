<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambioseh | Remesas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #ffffff; font-family: sans-serif; margin: 0; padding: 0; }
        .bg-dark { background-color: #1a1a1a; }
        .text-naranja { color: #FF6B00; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>

    <div class="w-full py-6 flex justify-center border-b border-gray-100">
        <img src="https://i.ibb.co/FLhP6VbN/logo.png" alt="Cambioseh" style="height: 80px; width: auto; max-width: 90%;">
    </div>

    <div class="bg-gray-50 py-4 flex justify-around border-b border-gray-200">
        <div class="text-center">
            <p class="text-[10px] font-bold text-gray-400 uppercase">Tasa COP</p>
            <p class="text-xl font-black text-black">3.82</p>
        </div>
        <div class="text-center border-l border-gray-200 pl-10">
            <p class="text-[10px] font-bold text-gray-400 uppercase">Tasa BCV</p>
            <p class="text-xl font-black text-black">45.48</p>
        </div>
    </div>

    <div class="max-w-md mx-auto p-6">
        <div class="bg-white rounded-3xl border-2 border-gray-100 p-6 shadow-xl">
            <h2 class="text-center font-bold text-gray-800 mb-6 uppercase tracking-widest text-sm">Calculadora de Cambio</h2>
            
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 mb-2 block uppercase">Envías Pesos Colombianos</label>
                    <div class="flex items-center bg-gray-100 p-4 rounded-xl">
                        <img src="https://flagcdn.com/w40/co.png" class="w-6 mr-3">
                        <input type="number" id="cop" value="100000" class="bg-transparent text-2xl font-bold w-full outline-none">
                        <span class="font-bold text-gray-400">COP</span>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-400 mb-2 block uppercase">Reciben Bolívares</label>
                    <div class="flex items-center bg-orange-50 p-4 rounded-xl border border-orange-100">
                        <img src="https://flagcdn.com/w40/ve.png" class="w-6 mr-3">
                        <input type="number" id="bs" class="bg-transparent text-2xl font-bold w-full outline-none">
                        <span class="font-bold text-gray-400">VES</span>
                    </div>
                </div>

                <div class="bg-black text-white p-5 rounded-2xl text-center">
                    <p class="text-[10px] font-bold text-orange-400 uppercase mb-1">Referencia Dólares BCV</p>
                    <p class="text-3xl font-black">$ <span id="usd">0.00</span></p>
                </div>
            </div>

            <button onclick="window.location.href='registro.html'" class="w-full bg-[#FF6B00] text-white font-black py-5 rounded-2xl mt-8 text-lg uppercase shadow-lg shadow-orange-200">
                REGISTRARME Y ENVIAR
            </button>
        </div>
    </div>

    <a href="https://wa.me/573203043142" class="fixed bottom-6 right-6 bg-[#25D366] text-white w-16 h-16 rounded-full flex items-center justify-center text-4xl shadow-2xl z-50">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script>
        const T_COP = 3.82;
        const T_BCV = 45.48;
        const c = document.getElementById('cop');
        const b = document.getElementById('bs');
        const u = document.getElementById('usd');

        function calcular(val, tipo) {
            let n = parseFloat(val) || 0;
            if(tipo === 'c') {
                let resBs = n * T_COP;
                b.value = resBs.toFixed(0);
                u.innerText = (resBs / T_BCV).toFixed(2);
            } else {
                c.value = (n / T_COP).toFixed(0);
                u.innerText = (n / T_BCV).toFixed(2);
            }
        }

        c.addEventListener('input', (e) => calcular(e.target.value, 'c'));
        b.addEventListener('input', (e) => calcular(e.target.value, 'b'));
        
        // Iniciar con 100.000 COP
        calcular(100000, 'c');
    </script>
</body>
</html>
