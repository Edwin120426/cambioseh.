<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambioseh | Tasas Garantizadas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; }
        .text-naranja { color: #FF6B00; }
        .bg-naranja { background-color: #FF6B00; }
        .bg-dark { background-color: #121212; }
        .card-tasa { background: #ffffff; border: 1px solid #f1f5f9; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
    </style>
</head>
<body class="text-slate-900">

    <nav class="sticky top-0 z-50 bg-white border-b border-slate-100 shadow-sm">
        <div class="max-w-6xl mx-auto px-6 h-24 flex justify-between items-center">
            <img src="https://i.ibb.co/FLhP6VbN/logo.png" alt="Cambioseh" class="h-16 w-auto object-contain">
            
            <div class="flex gap-4">
                <a href="login.html" class="hidden md:block font-bold text-slate-600 pt-2">Entrar</a>
                <a href="registro.html" class="bg-dark text-white px-8 py-3 rounded-full font-extrabold text-sm hover:bg-naranja transition-all shadow-lg">REGISTRO</a>
            </div>
        </div>
    </nav>

    <header class="bg-dark text-white pt-12 pb-24 px-6 text-center">
        <span class="inline-block bg-naranja text-white text-[10px] font-black px-4 py-1 rounded-full mb-6 uppercase tracking-[2px]">Tasa Garantizada 2026</span>
        <h1 class="text-4xl md:text-6xl font-extrabold mb-10 leading-tight">Remesas <span class="text-naranja">Seguras</span></h1>
        
        <div class="max-w-4xl mx-auto grid grid-cols-2 gap-4 md:gap-8">
            <div class="card-tasa p-6 rounded-[2rem] text-dark">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-2">Tasa COP a BS</p>
                <p class="text-3xl md:text-5xl font-black text-slate-900">3.82</p>
            </div>
            <div class="card-tasa p-6 rounded-[2rem] text-dark">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-2">Dólar BCV Ref.</p>
                <p class="text-3xl md:text-5xl font-black text-slate-900">45.48</p>
            </div>
        </div>
    </header>

    <section class="max-w-5xl mx-auto -mt-12 px-6">
        <div class="bg-white rounded-[3rem] shadow-2xl p-8 md:p-12 border border-slate-100">
            <div class="grid md:grid-cols-3 gap-6">
                <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100">
                    <label class="text-[10px] font-black text-slate-400 uppercase block mb-3">Tú envías Pesos</label>
                    <div class="flex items-center">
                        <input type="number" id="cop" value="100000" class="bg-transparent text-2xl font-black w-full outline-none">
                        <span class="font-bold text-slate-400">COP</span>
                    </div>
                </div>
                <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100">
                    <label class="text-[10px] font-black text-slate-400 uppercase block mb-3">Ellos Reciben BS</label>
                    <div class="flex items-center">
                        <input type="number" id="bs" class="bg-transparent text-2xl font-black w-full outline-none">
                        <span class="font-bold text-slate-400">VES</span>
                    </div>
                </div>
                <div class="bg-naranja/5 p-6 rounded-3xl border-2 border-naranja/10">
                    <label class="text-[10px] font-black text-naranja uppercase block mb-3">Equivalente USD BCV</label>
                    <div class="flex items-center">
                        <input type="number" id="usd" class="bg-transparent text-2xl font-black w-full outline-none text-naranja">
                        <span class="font-bold text-naranja/40">USD</span>
                    </div>
                </div>
            </div>

            <button onclick="window.location.href='registro.html'" class="w-full bg-dark hover:bg-naranja text-white font-black py-6 rounded-[2rem] mt-8 text-xl transition-all shadow-xl uppercase tracking-widest">
                Comenzar Envío
            </button>
        </div>
    </section>

    <a href="https://wa.me/573203043142" class="fixed bottom-10 right-10 bg-green-500 text-white w-20 h-20 rounded-full flex items-center justify-center text-4xl shadow-2xl z-[100] hover:scale-110 transition-all">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script>
        const T_COP = 3.82, T_BCV = 45.48;
        const c = document.getElementById('cop'), b = document.getElementById('bs'), u = document.getElementById('usd');
        
        function updateAll(val, type) {
            if(type === 'c') {
                const resBs = val * T_COP;
                b.value = resBs.toFixed(2);
                u.value = (resBs / T_BCV).toFixed(2);
            } else if(type === 'b') {
                c.value = (val / T_COP).toFixed(2);
                u.value = (val / T_BCV).toFixed(2);
            } else if(type === 'u') {
                const resBs = val * T_BCV;
                b.value = resBs.toFixed(2);
                c.value = (resBs / T_COP).toFixed(2);
            }
        }

        c.addEventListener('input', (e) => updateAll(e.target.value, 'c'));
        b.addEventListener('input', (e) => updateAll(e.target.value, 'b'));
        u.addEventListener('input', (e) => updateAll(e.target.value, 'u'));
        
        // Inicializar
        updateAll(100000, 'c');
    </script>
</body>
</html>
