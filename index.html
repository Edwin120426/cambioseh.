<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambioseh | Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0a192f; font-family: sans-serif; margin: 0; }
        .card-blanca { background: white; border-radius: 24px; padding: 25px; color: #1e293b; }
        .texto-esmeralda { color: #10b981; }
        .boton-registro { background-color: #10b981; color: white; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div style="background: white; padding: 20px; text-align: center; border-bottom: 2px solid #10b981;">
        <img src="https://i.ibb.co/FLhP6VbN/logo.png" alt="Cambioseh" style="height: 60px; width: auto; margin: 0 auto; display: block;">
    </div>

    <div style="max-width: 450px; margin: 0 auto; padding: 20px;">
        
        <div style="text-align: center; margin-bottom: 30px; margin-top: 10px;">
            <h1 style="color: white; font-size: 28px; font-weight: 800; line-height: 1.2;">
                Envía dinero <br> <span class="texto-esmeralda italic">Sin Comisiones</span>
            </h1>
            <p style="color: #64748b; font-size: 14px; margin-top: 10px;">La tasa más alta del mercado hoy.</p>
        </div>

        <div class="card-blanca">
            <div style="display: flex; justify-content: space-around; margin-bottom: 25px; border-bottom: 1px solid #f1f5f9; padding-bottom: 15px;">
                <div style="text-align: center;">
                    <small style="color: #94a3b8; font-weight: bold; font-size: 10px;">TASA COP</small><br>
                    <strong style="font-size: 20px;">3.82</strong>
                </div>
                <div style="text-align: center;">
                    <small style="color: #94a3b8; font-weight: bold; font-size: 10px;">DÓLAR BCV</small><br>
                    <strong style="font-size: 20px;">45.48</strong>
                </div>
            </div>

            <div style="margin-bottom: 15px;">
                <label style="font-size: 11px; font-weight: bold; color: #64748b;">TÚ ENVÍAS (PESOS)</label>
                <div style="display: flex; align-items: center; background: #f8fafc; padding: 15px; border-radius: 15px; margin-top: 5px; border: 1px solid #e2e8f0;">
                    <img src="https://flagcdn.com/w40/co.png" style="width: 25px; margin-right: 10px;">
                    <input type="number" id="cop" value="100000" style="width: 100%; border: none; background: transparent; font-size: 22px; font-weight: bold; outline: none;">
                </div>
            </div>

            <div style="margin-bottom: 25px;">
                <label style="font-size: 11px; font-weight: bold; color: #10b981;">ELLOS RECIBEN (BOLÍVARES)</label>
                <div style="display: flex; align-items: center; background: #f0fdf4; padding: 15px; border-radius: 15px; margin-top: 5px; border: 1px solid #bbf7d0;">
                    <img src="https://flagcdn.com/w40/ve.png" style="width: 25px; margin-right: 10px;">
                    <input type="number" id="bs" style="width: 100%; border: none; background: transparent; font-size: 22px; font-weight: bold; outline: none; color: #166534;">
                </div>
            </div>

            <button onclick="window.location.href='registro.html'" style="width: 100%; background: #0a192f; color: white; padding: 20px; border-radius: 15px; font-weight: bold; font-size: 16px; border: none; box-shadow: 0 10px 20px rgba(0,0,0,0.1);">
                INICIAR TRANSFERENCIA
            </button>
        </div>

        <div style="margin-top: 25px; display: flex; gap: 10px;">
            <a href="login.html" style="flex: 1; background: rgba(255,255,255,0.05); color: white; text-align: center; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 13px; border: 1px solid rgba(255,255,255,0.1);">LOGIN</a>
            <a href="registro.html" style="flex: 1; background: #10b981; color: white; text-align: center; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 13px;">REGISTRO</a>
        </div>

    </div>

    <a href="https://wa.me/573203043142" style="position: fixed; bottom: 20px; right: 20px; background: #25D366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 1000;">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script>
        const T_COP = 3.82, T_BCV = 45.48;
        const c = document.getElementById('cop'), b = document.getElementById('bs');
        function calc(v, t) {
            let n = parseFloat(v) || 0;
            if(t === 'c') b.value = (n * T_COP).toFixed(0);
            else c.value = (n / T_COP).toFixed(0);
        }
        c.addEventListener('input', (e) => calc(e.target.value, 'c'));
        b.addEventListener('input', (e) => calc(e.target.value, 'b'));
        calc(100000, 'c');
    </script>
</body>
</html>
